CONFIG_MYIO=y
CONFIG_MYIO_POOL=y
# One eventfd per pool worker plus the event-loop backend's wakeup.
CONFIG_ZVFS_EVENTFD_MAX=8

# Sockets offloaded to the host (native_sim): real networking with no TAP
# or root setup on the host side.
CONFIG_NETWORKING=y
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_ETH_NATIVE_TAP=n
CONFIG_NET_NATIVE=n
CONFIG_NET_L2_ETHERNET=n

# Every in-flight myio task can occupy one poll slot, plus the eventfd.
CONFIG_ZVFS_POLL_MAX=40
CONFIG_ZVFS_OPEN_MAX=40

# File IO: littlefs on the simulated flash's storage partition.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_SIMULATOR=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y

CONFIG_MAIN_STACK_SIZE=16384
CONFIG_HEAP_MEM_POOL_SIZE=16384
